<script>
// Remove the hardcoded const PASSWORD = 'raddapp';

async function loginWithPassword() {
  const passwordInput = document.getElementById('passwordInput').value;
  const errorDiv = document.getElementById('passwordError');
  
  try {
    // Call your new API verify action
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        password: passwordInput, 
        action: 'verify' 
      })
    });

    const data = await res.json();

    if (res.ok && data.success) {
      sessionStorage.setItem('radd_auth', 'password');
      // Store the password to send with future AI requests
      sessionStorage.setItem('radd_key', passwordInput); 
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('sessionBadge').textContent = '● Authorized';
    } else {
      errorDiv.textContent = 'Incorrect password or unauthorized.';
    }
  } catch (e) {
    errorDiv.textContent = 'Connection error.';
  }
}

// Update the AI calling functions to include the password
async function draftOutput() {
  state.phase = 'drafting';
  showTyping();
  
  const password = sessionStorage.getItem('radd_key');
  const pc = state.profile.name ? `Author: ${state.profile.name}${state.profile.role ? ', ' + state.profile.role : ''}. ${state.profile.about || ''}` : '';
  const at = state.interviewAnswers.length ? '\n\nInterview answers:\n' + state.interviewAnswers.map((a, i) => `Q${i+1}: ${a.q}\nA: ${a.a}`).join('\n\n') : '';
  
  const sys = `You are Radd, an expert AI drafting assistant. ${pc}\n${getLengthInstr(getLength())} Tone: ${getTone()}. Language: ${getLang()}.\nAuto-detect context and format accordingly. Output ONLY the draft — no preamble.`;
  
  try {
    // Added 'password' to the body here
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        password: password,
        system: sys,
        messages: [{ role: 'user', content: `Input: ${state.originalInput}${at}\n\nDraft now.` }]
      })
    });
    
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    removeTyping();
    addMessage('radd', data.text, true);
    state.phase = 'done';
  } catch (e) {
    removeTyping();
    addMessage('radd', 'Error: ' + e.message);
    state.phase = 'idle';
  }
}

// Update follow-up logic to include the password as well
async function applyFollowUp(instruction) {
  addMessage('user', instruction);
  const cur = state.currentDraftEl?.innerText || '';
  const password = sessionStorage.getItem('radd_key');
  showTyping();
  
  const sys = `You are Radd. Revise this draft:\n"${cur}"\nInstruction: "${instruction}"\n${getLengthInstr(getLength())} Tone: ${getTone()}. Language: ${getLang()}.\nOutput only the revised draft.`;
  
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        password: password,
        system: sys,
        messages: [{ role: 'user', content: 'Revise.' }]
      })
    });
    
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    removeTyping();
    state.currentDraftEl?.closest('.msg')?.remove();
    addMessage('radd', data.text, true);
    state.phase = 'done';
    document.getElementById('mainInput').placeholder = 'Paste a message, describe a project, write anything...';
  } catch (e) {
    removeTyping();
    addMessage('radd', 'Error: ' + e.message);
    state.phase = 'done';
  }
}
</script>
