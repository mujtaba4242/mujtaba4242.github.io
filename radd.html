<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radd | Strategic AI</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --accent-blue: #38bdf8;
            --user-msg: #334155;
            --radd-msg: #0ea5e9;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        header {
            padding: 1rem 2rem;
            background: var(--card-bg);
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-blue);
            letter-spacing: -1px;
        }

        /* Chat Container */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message {
            max-width: 80%;
            padding: 1rem;
            border-radius: 12px;
            line-height: 1.5;
            /* Auto-align for Arabic and English */
            unicode-bidi: plaintext;
            text-align: start;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg);
            border-bottom-right-radius: 2px;
        }

        .radd-message {
            align-self: flex-start;
            background-color: var(--radd-msg);
            border-bottom-left-radius: 2px;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.2);
        }

        /* Input Area */
        .input-wrapper {
            padding: 2rem;
            background: var(--card-bg);
            border-top: 1px solid #334155;
            display: flex;
            gap: 1rem;
        }

        input {
            flex: 1;
            background: var(--bg-color);
            border: 1px solid #475569;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: white;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-blue);
        }

        button {
            background: var(--accent-blue);
            color: #0f172a;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.95);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .online { background: #22c55e; }
        .offline { background: #ef4444; }
    </style>
</head>
<body>

<header>
    <div class="logo">RADD</div>
    <div id="auth-status"><span class="status-dot offline" id="dot"></span><span id="status-text">Locked</span></div>
</header>

<div id="chat-container">
    <div class="message radd-message">Welcome. Enter the access key to begin our session.</div>
</div>

<div class="input-wrapper">
    <input type="text" id="user-input" placeholder="Type your message..." onkeypress="if(event.key === 'Enter') sendMessage()">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    let chatHistory = [];
    let appPassword = localStorage.getItem('radd_session_key') || '';

    // Check auth status on load
    window.onload = async () => {
        if (appPassword) {
            const isValid = await verifyPassword(appPassword);
            if (isValid) setOnline();
            else localStorage.removeItem('radd_session_key');
        }
    };

    function setOnline() {
        document.getElementById('dot').className = 'status-dot online';
        document.getElementById('status-text').innerText = 'Authorized';
    }

    async function verifyPassword(input) {
        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: input, action: 'verify' })
            });
            const data = await response.json();
            return data.success;
        } catch (e) {
            return false;
        }
    }

    function addMessageToUI(role, text) {
        const container = document.getElementById('chat-container');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role === 'user' ? 'user-message' : 'radd-message'}`;
        msgDiv.innerText = text;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const userText = inputField.value.trim();
        if (!userText) return;

        // 1. Password Verification Handshake
        if (!appPassword) {
            const promptPass = prompt("Enter Radd Access Key:");
            const isValid = await verifyPassword(promptPass);
            if (isValid) {
                appPassword = promptPass;
                localStorage.setItem('radd_session_key', appPassword);
                setOnline();
            } else {
                alert("Unauthorized.");
                return;
            }
        }

        // UI Update
        addMessageToUI('user', userText);
        chatHistory.push({ role: 'user', content: userText });
        inputField.value = '';

        // 2. AI Request
        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    password: appPassword,
                    system: "You are Radd, a professional strategic assistant. Be concise and insightful.",
                    messages: chatHistory
                })
            });

            const data = await response.json();

            if (response.status === 401) {
                alert("Session expired.");
                localStorage.removeItem('radd_session_key');
                location.reload();
                return;
            }

            if (data.text) {
                addMessageToUI('assistant', data.text);
                chatHistory.push({ role: 'assistant', content: data.text });
            } else {
                addMessageToUI('assistant', "System Error: " + (data.error || "Unknown response"));
            }
        } catch (error) {
            addMessageToUI('assistant', "Connection Error. Google servers may be overloaded (503).");
        }
    }
</script>

</body>
</html>
